<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ערב 10 - כתובת מלאה</title><style>body{font-family:Arial;background:#090704;color:white;padding:20px}input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #caa45a;background:#111;color:white}button{background:#d7ad55;color:#160b02;font-weight:bold}.card{border:1px solid #caa45a;border-radius:20px;padding:16px;margin-top:16px}</style></head><body><h1>ערב 10</h1><h2>הוסף לקוח עם כתובת מלאה</h2><input id="name" placeholder="שם מלא"><input id="street" placeholder="רחוב"><input id="house" placeholder="מספר בית"><input id="floor" placeholder="קומה"><button onclick="add()">שמור</button><div id="list"></div><script>function add(){list.innerHTML='<div class=card><b>'+name.value+'</b><br>רחוב: '+street.value+'<br>מספר בית: '+house.value+'<br>קומה: '+floor.value+'</div>'+list.innerHTML}</script></body></html>
