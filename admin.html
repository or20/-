<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ניהול ערב 10</title>
<meta name="theme-color" content="#070604">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Assistant,Arial,sans-serif;background:#070604;color:#fff;line-height:1.45;min-height:100svh}button,input,textarea{font:inherit}.app{min-height:100svh;background:radial-gradient(circle at 50% -20%,rgba(240,198,107,.22),transparent 42%),linear-gradient(180deg,#080604,#130d05 55%,#060504);padding:20px 14px 90px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:760px;margin:0 auto 18px}.brand{display:flex;align-items:center;gap:11px}.logo{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#f4d493,#a56d22);display:grid;place-items:center;color:#130b02;font-weight:900;font-size:19px;box-shadow:0 15px 45px rgba(216,173,85,.22)}.brand h1{font-size:23px;line-height:1}.brand p{font-size:12px;color:#b7a58d}.pill{border:1px solid rgba(244,212,147,.25);background:rgba(255,255,255,.06);border-radius:999px;padding:8px 12px;color:#f4d493;font-weight:800;font-size:12px}.wrap{max-width:760px;margin:auto}.hero{background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.04));border:1px solid rgba(244,212,147,.28);border-radius:28px;padding:20px;box-shadow:0 25px 80px rgba(0,0,0,.35);margin-bottom:14px}.hero-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.hero h2{font-size:21px}.hero small{display:block;color:#b7a58d;margin-top:4px}.bakery{font-size:48px;font-weight:900;color:#f4d493;line-height:1;margin:18px 0 4px}.bakery span{font-size:18px;color:#d8c7ad}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{background:rgba(0,0,0,.22);border:1px solid rgba(244,212,147,.16);border-radius:20px;padding:14px}.stat b{display:block;font-size:26px;color:#fff}.stat p{font-size:12px;color:#b7a58d}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.btn{border:0;border-radius:18px;padding:15px 14px;font-weight:900;cursor:pointer;text-decoration:none;text-align:center;display:block}.btn.gold{background:linear-gradient(135deg,#f4d493,#b9822e);color:#130b02}.btn.dark{background:rgba(255,255,255,.08);border:1px solid rgba(244,212,147,.18);color:#fff}.tabs{display:flex;gap:8px;margin:18px 0 12px;overflow:auto;padding-bottom:2px}.tab{white-space:nowrap;border:1px solid rgba(244,212,147,.16);background:rgba(255,255,255,.06);color:#d8c7ad;border-radius:999px;padding:10px 14px;font-weight:800}.tab.active{background:#f4d493;color:#130b02}.list{display:grid;gap:10px}.client{background:rgba(255,255,255,.065);border:1px solid rgba(244,212,147,.16);border-radius:24px;padding:15px;display:grid;gap:12px}.client.done{opacity:.62}.client.cancelled{border-color:rgba(255,88,88,.35);background:rgba(255,65,65,.08)}.client.wait{border-color:rgba(255,190,70,.35);background:rgba(255,190,70,.08)}.line{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.name{font-weight:900;font-size:18px}.meta{color:#c8b89f;font-size:14px}.tag{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900}.green{background:rgba(51,216,128,.16);color:#68f0a1}.red{background:rgba(255,91,91,.15);color:#ff8d8d}.yellow{background:rgba(244,212,147,.16);color:#f4d493}.card-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.mini{border:0;border-radius:14px;padding:12px 8px;font-weight:900;background:rgba(255,255,255,.08);color:#fff}.mini.ok{background:rgba(51,216,128,.18);color:#78f2a8}.mini.bad{background:rgba(255,91,91,.14);color:#ff9d9d}.mini.call{background:rgba(244,212,147,.16);color:#f4d493;text-decoration:none;text-align:center}.addbox{display:none;background:rgba(255,255,255,.065);border:1px solid rgba(244,212,147,.16);border-radius:24px;padding:16px;margin-bottom:12px}label{display:block;color:#ead7b8;font-weight:800;margin:10px 0 6px}input,textarea{width:100%;border:1px solid rgba(244,212,147,.18);background:#080604;color:#fff;border-radius:15px;padding:13px;outline:0}textarea{min-height:70px;resize:none}.notice{font-size:12px;color:#9c8f7b;margin-top:10px;text-align:center}.floating{position:fixed;left:14px;right:14px;bottom:14px;max-width:760px;margin:auto;background:rgba(8,6,4,.88);backdrop-filter:blur(18px);border:1px solid rgba(244,212,147,.22);border-radius:22px;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:9px}@media(min-width:780px){.floating{left:50%;right:auto;transform:translateX(-50%);width:760px}.app{padding-top:32px}.grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<main class="app">
<header class="top">
  <div class="brand"><div class="logo">10</div><div><h1>ערב 10</h1><p>פאנל ניהול משלוחים</p></div></div>
  <div class="pill" id="lockPill">בודק שעה...</div>
</header>
<section class="wrap">
  <div class="hero">
    <div class="hero-row"><div><h2>הכמות למאפייה היום</h2><small>נסגר אוטומטית ב־12:00 בצהריים</small></div><div class="pill" id="dateText"></div></div>
    <div class="bakery"><span id="bunsCount">0</span> <span>לחמניות</span></div>
    <div class="grid">
      <div class="stat"><b id="activeCount">0</b><p>פעילים היום</p></div>
      <div class="stat"><b id="deliveredCount">0</b><p>נמסרו</p></div>
      <div class="stat"><b id="leftCount">0</b><p>נשארו</p></div>
      <div class="stat"><b id="unpaidCount">0</b><p>לא שילמו</p></div>
    </div>
    <div class="actions">
      <button class="btn gold" onclick="sendBakery()">📲 שלח למאפייה</button>
      <button class="btn dark" onclick="startRoute()">🚚 התחל סבב</button>
    </div>
  </div>

  <div class="addbox" id="addBox">
    <h3>הוסף לקוח</h3>
    <label>שם</label><input id="newName" placeholder="שם מלא">
    <label>טלפון</label><input id="newPhone" inputmode="tel" placeholder="0500000000">
    <label>כתובת</label><input id="newAddress" placeholder="ניב דוד 12">
    <label>הערה לשליח</label><textarea id="newNote" placeholder="לתלות על הידית"></textarea>
    <div class="actions"><button class="btn gold" onclick="addClient()">שמור לקוח</button><button class="btn dark" onclick="toggleAdd()">סגור</button></div>
  </div>

  <nav class="tabs">
    <button class="tab active" onclick="setFilter('today',this)">היום</button>
    <button class="tab" onclick="setFilter('all',this)">כל הלקוחות</button>
    <button class="tab" onclick="setFilter('cancelled',this)">ביטלו היום</button>
    <button class="tab" onclick="setFilter('unpaid',this)">לא שילמו</button>
    <button class="tab" onclick="setFilter('wait',this)">המתנה</button>
  </nav>
  <div class="list" id="clientsList"></div>
  <p class="notice">גרסה ראשונה: הנתונים נשמרים במכשיר הזה. בשלב הבא נחבר מסד נתונים אמיתי לסנכרון מלא.</p>
</section>
<div class="floating">
  <button class="btn gold" onclick="toggleAdd()">➕ הוסף לקוח</button>
  <a class="btn dark" href="./">👁️ עמוד לקוח</a>
</div>
</main>
<script>
const STORAGE='erev10_clients_v1';
let filter='today';
const starter=[
 {id:1,name:'אלעד זגזג',phone:'0500000000',address:'ניב דוד 12',note:'לתלות על הידית',active:true,cancelled:false,delivered:false,paid:true,wait:false},
 {id:2,name:'משפחת כהן',phone:'0501111111',address:'ניב דוד 18',note:'קומה 2',active:true,cancelled:false,delivered:false,paid:true,wait:false},
 {id:3,name:'יוסי לוי',phone:'0502222222',address:'ניב דוד 25',note:'לא לדפוק בדלת',active:true,cancelled:false,delivered:false,paid:false,wait:false},
 {id:4,name:'משפחת ביטון',phone:'0503333333',address:'ניב דוד 31',note:'שער שחור',active:true,cancelled:true,delivered:false,paid:true,wait:false},
 {id:5,name:'דניאל אברהם',phone:'0504444444',address:'ניב דוד 44',note:'',active:false,cancelled:false,delivered:false,paid:false,wait:true}
];
let clients=JSON.parse(localStorage.getItem(STORAGE)||'null')||starter;
function save(){localStorage.setItem(STORAGE,JSON.stringify(clients));render()}
function isLocked(){const now=new Date();return now.getHours()>=12}
function statusText(){document.getElementById('lockPill').textContent=isLocked()?'🔒 נסגר להיום':'🟢 פתוח עד 12:00';document.getElementById('dateText').textContent=new Date().toLocaleDateString('he-IL')}
function todayActive(){return clients.filter(c=>c.active&&!c.wait&&!c.cancelled)}
function render(){statusText();const active=todayActive();const delivered=active.filter(c=>c.delivered).length;document.getElementById('activeCount').textContent=active.length+'/50';document.getElementById('bunsCount').textContent=active.length*10;document.getElementById('deliveredCount').textContent=delivered;document.getElementById('leftCount').textContent=active.length-delivered;document.getElementById('unpaidCount').textContent=clients.filter(c=>!c.paid&&!c.wait).length;let list=clients.filter(c=>{if(filter==='today')return c.active&&!c.wait&&!c.cancelled;if(filter==='cancelled')return c.cancelled;if(filter==='unpaid')return !c.paid&&!c.wait;if(filter==='wait')return c.wait;return true}).sort((a,b)=>a.address.localeCompare(b.address,'he'));document.getElementById('clientsList').innerHTML=list.map(c=>`<div class="client ${c.delivered?'done':''} ${c.cancelled?'cancelled':''} ${c.wait?'wait':''}"><div class="line"><div><div class="name">${c.name}</div><div class="meta">📍 ${c.address}</div>${c.note?`<div class="meta">📝 ${c.note}</div>`:''}</div><div class="tag ${c.wait?'yellow':c.cancelled?'red':c.delivered?'green':'yellow'}">${c.wait?'המתנה':c.cancelled?'ביטל':c.delivered?'נמסר':'ממתין'}</div></div><div class="card-actions"><button class="mini ok" onclick="toggleDelivered(${c.id})">${c.delivered?'בטל נמסר':'נמסר'}</button><button class="mini bad" onclick="toggleCancel(${c.id})">${c.cancelled?'החזר היום':'היום לא'}</button><a class="mini call" href="tel:${c.phone}">התקשר</a></div><div class="card-actions"><button class="mini" onclick="togglePaid(${c.id})">${c.paid?'שולם':'לא שילם'}</button><button class="mini" onclick="toggleWait(${c.id})">${c.wait?'אשר לקוח':'המתנה'}</button><a class="mini call" href="https://wa.me/972${c.phone.replace(/\D/g,'').replace(/^0/,'')}" target="_blank">וואטסאפ</a></div></div>`).join('')||'<div class="client"><b>אין נתונים במסנן הזה</b></div>'}
function setFilter(f,el){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render()}
function find(id){return clients.find(c=>c.id===id)}
function toggleDelivered(id){const c=find(id);c.delivered=!c.delivered;save()}
function toggleCancel(id){const c=find(id);if(isLocked()&&!c.cancelled){alert('אחרי 12:00 אי אפשר לבטל להיום');return}c.cancelled=!c.cancelled;if(c.cancelled)c.delivered=false;save()}
function togglePaid(id){const c=find(id);c.paid=!c.paid;save()}
function toggleWait(id){const c=find(id);c.wait=!c.wait;c.active=!c.wait;save()}
function toggleAdd(){const box=document.getElementById('addBox');box.style.display=box.style.display==='block'?'none':'block'}
function addClient(){const name=newName.value.trim(),phone=newPhone.value.trim(),address=newAddress.value.trim();if(!name||!phone||!address){alert('חסר שם, טלפון או כתובת');return}const activeCount=clients.filter(c=>c.active&&!c.wait).length;clients.push({id:Date.now(),name,phone,address,note:newNote.value.trim(),active:activeCount<50,cancelled:false,delivered:false,paid:false,wait:activeCount>=50});newName.value=newPhone.value=newAddress.value=newNote.value='';document.getElementById('addBox').style.display='none';save()}
function sendBakery(){const qty=todayActive().length*10;const msg=`שלום, להיום בערב צריך להכין ${qty} לחמניות לערב 10. תודה.`;window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank')}
function startRoute(){filter='today';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelector('.tab').classList.add('active');render();document.getElementById('clientsList').scrollIntoView({behavior:'smooth'})}
render();setInterval(statusText,30000);
</script>
</body>
</html>
