<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>ניהול ערב 10</title>
<meta name="theme-color" content="#070604">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Assistant,Arial,sans-serif;background:#070604;color:#fff;min-height:100svh;line-height:1.45}button,input,textarea{font:inherit}.app{min-height:100svh;background:radial-gradient(circle at 50% -15%,rgba(240,198,107,.24),transparent 43%),linear-gradient(180deg,#080604,#130d05 58%,#060504);padding:18px 14px 92px}.wrap{max-width:820px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px}.brand{display:flex;gap:11px;align-items:center}.logo{width:48px;height:48px;border-radius:18px;background:linear-gradient(135deg,#f7d995,#a86f25);display:grid;place-items:center;color:#140b02;font-size:20px;font-weight:900;box-shadow:0 18px 52px rgba(216,173,85,.24)}h1{font-size:23px;line-height:1}.muted{color:#b7a58d;font-size:13px}.pill{border:1px solid rgba(244,212,147,.26);background:rgba(255,255,255,.065);border-radius:999px;padding:8px 12px;color:#f4d493;font-weight:900;font-size:12px;white-space:nowrap}.hero{background:linear-gradient(145deg,rgba(255,255,255,.13),rgba(255,255,255,.04));border:1px solid rgba(244,212,147,.3);border-radius:30px;padding:20px;box-shadow:0 28px 90px rgba(0,0,0,.36);margin-bottom:14px}.heroHead{display:flex;justify-content:space-between;gap:12px}.hero h2{font-size:22px}.big{font-size:54px;font-weight:900;color:#f4d493;line-height:1;margin:16px 0 3px}.big small{font-size:18px;color:#d8c7ad}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}.stat{background:rgba(0,0,0,.24);border:1px solid rgba(244,212,147,.16);border-radius:20px;padding:13px}.stat b{display:block;font-size:26px}.stat p{color:#b7a58d;font-size:12px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:18px;padding:15px 13px;font-weight:900;cursor:pointer;text-align:center;text-decoration:none;display:block}.gold{background:linear-gradient(135deg,#f7d995,#b9822e);color:#130b02}.dark{background:rgba(255,255,255,.08);border:1px solid rgba(244,212,147,.18);color:#fff}.greenBtn{background:rgba(51,216,128,.18);color:#86f5b1}.redBtn{background:rgba(255,91,91,.14);color:#ffa0a0}.bar{display:grid;grid-template-columns:1fr auto;gap:10px;margin:15px 0 10px}input,textarea{width:100%;border:1px solid rgba(244,212,147,.18);background:#080604;color:#fff;border-radius:16px;padding:13px 14px;outline:0}input:focus,textarea:focus{border-color:#f4d493;box-shadow:0 0 0 4px rgba(244,212,147,.1)}.tabs{display:flex;gap:8px;overflow:auto;padding:2px 0 12px}.tab{white-space:nowrap;border:1px solid rgba(244,212,147,.16);background:rgba(255,255,255,.06);color:#d8c7ad;border-radius:999px;padding:10px 14px;font-weight:900}.tab.active{background:#f4d493;color:#130b02}.list{display:grid;gap:10px}.client{background:rgba(255,255,255,.066);border:1px solid rgba(244,212,147,.16);border-radius:24px;padding:15px;display:grid;gap:12px}.client.done{opacity:.6}.client.cancelled{border-color:rgba(255,88,88,.35);background:rgba(255,65,65,.08)}.client.wait{border-color:rgba(255,190,70,.35);background:rgba(255,190,70,.08)}.line{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.name{font-weight:900;font-size:18px}.meta{color:#c8b89f;font-size:14px}.tag{border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900}.green{background:rgba(51,216,128,.16);color:#68f0a1}.red{background:rgba(255,91,91,.15);color:#ff8d8d}.yellow{background:rgba(244,212,147,.16);color:#f4d493}.cardActions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.mini{border:0;border-radius:14px;padding:12px 7px;font-weight:900;background:rgba(255,255,255,.08);color:#fff;text-align:center;text-decoration:none}.addbox,.courier{display:none;background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.04));border:1px solid rgba(244,212,147,.26);border-radius:28px;padding:18px;margin-bottom:14px}label{display:block;color:#ead7b8;font-weight:900;margin:11px 0 6px}textarea{min-height:76px;resize:none}.courier{text-align:center;padding:24px 18px}.courier .addr{font-size:32px;font-weight:900;color:#f4d493;margin:16px 0 8px}.courier .who{font-size:23px;font-weight:900}.courier .note{color:#d8c7ad;margin-bottom:18px}.courierBtns{display:grid;gap:10px}.notice{font-size:12px;color:#9c8f7b;margin-top:12px;text-align:center}.floating{position:fixed;left:14px;right:14px;bottom:14px;max-width:820px;margin:auto;background:rgba(8,6,4,.9);backdrop-filter:blur(18px);border:1px solid rgba(244,212,147,.22);border-radius:22px;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:9px}.toast{position:fixed;top:14px;left:14px;right:14px;max-width:520px;margin:auto;background:#f4d493;color:#130b02;border-radius:18px;padding:13px 16px;font-weight:900;text-align:center;display:none;z-index:9}@media(min-width:780px){.grid{grid-template-columns:repeat(4,1fr)}.floating{left:50%;right:auto;transform:translateX(-50%);width:820px}.app{padding-top:30px}.courierBtns{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<main class="app"><section class="wrap">
<header class="top"><div class="brand"><div class="logo">10</div><div><h1>ערב 10</h1><p class="muted">פאנל ניהול משלוחים</p></div></div><div class="pill" id="lockPill">בודק...</div></header>
<div class="hero">
 <div class="heroHead"><div><h2>הכמות למאפייה היום</h2><p class="muted">עד 12:00 אפשר לבטל. אחרי זה הכמות ננעלת.</p></div><div class="pill" id="dateText"></div></div>
 <div class="big"><span id="bunsCount">0</span> <small>לחמניות</small></div>
 <div class="grid"><div class="stat"><b id="activeCount">0</b><p>פעילים היום</p></div><div class="stat"><b id="deliveredCount">0</b><p>נמסרו</p></div><div class="stat"><b id="leftCount">0</b><p>נשארו</p></div><div class="stat"><b id="unpaidCount">0</b><p>לא שילמו</p></div></div>
 <div class="actions"><button class="btn gold" onclick="sendBakery()">📲 שלח למאפייה</button><button class="btn dark" onclick="openCourier()">🚚 מצב שליח</button></div>
</div>
<div class="courier" id="courierBox"><p class="pill" style="display:inline-block">מצב שליח</p><div class="addr" id="cAddr">אין משלוחים</div><div class="who" id="cName"></div><div class="note" id="cNote"></div><div class="courierBtns"><button class="btn greenBtn" onclick="courierDone()">✅ נמסר ועבור לבא</button><button class="btn redBtn" onclick="courierProblem()">❌ בעיה / לא נמסר</button></div><button class="btn dark" style="margin-top:10px" onclick="closeCourier()">סגור מצב שליח</button></div>
<div class="addbox" id="addBox"><h3>הוסף לקוח</h3><label>שם</label><input id="newName" placeholder="שם מלא"><label>טלפון</label><input id="newPhone" inputmode="tel" placeholder="0500000000"><label>כתובת</label><input id="newAddress" placeholder="ניב דוד 12"><label>הערה לשליח</label><textarea id="newNote" placeholder="לתלות על הידית"></textarea><div class="actions"><button class="btn gold" onclick="addClient()">שמור לקוח</button><button class="btn dark" onclick="toggleAdd()">סגור</button></div></div>
<div class="bar"><input id="search" placeholder="חיפוש שם / כתובת / טלפון" oninput="render()"><button class="btn dark" onclick="resetDay()">איפוס ערב</button></div>
<nav class="tabs"><button class="tab active" onclick="setFilter('today',this)">היום</button><button class="tab" onclick="setFilter('all',this)">כל הלקוחות</button><button class="tab" onclick="setFilter('cancelled',this)">ביטלו</button><button class="tab" onclick="setFilter('unpaid',this)">לא שילמו</button><button class="tab" onclick="setFilter('wait',this)">המתנה</button></nav>
<div class="list" id="clientsList"></div><p class="notice">גרסת ניהול משודרגת. כרגע נשמר במכשיר הזה; בשלב הבא מסד נתונים אמיתי לסנכרון מלא.</p>
</section><div class="floating"><button class="btn gold" onclick="toggleAdd()">➕ הוסף לקוח</button><a class="btn dark" href="./">👁️ עמוד לקוח</a></div></main>
<script>
const STORAGE='erev10_clients_v2';let filter='today';let courierIndex=0;
const starter=[{id:1,name:'אלעד זגזג',phone:'0500000000',address:'ניב דוד 12',note:'לתלות על הידית',active:true,cancelled:false,delivered:false,paid:true,wait:false,problem:false},{id:2,name:'משפחת כהן',phone:'0501111111',address:'ניב דוד 18',note:'קומה 2',active:true,cancelled:false,delivered:false,paid:true,wait:false,problem:false},{id:3,name:'יוסי לוי',phone:'0502222222',address:'ניב דוד 25',note:'לא לדפוק בדלת',active:true,cancelled:false,delivered:false,paid:false,wait:false,problem:false},{id:4,name:'משפחת ביטון',phone:'0503333333',address:'ניב דוד 31',note:'שער שחור',active:true,cancelled:true,delivered:false,paid:true,wait:false,problem:false},{id:5,name:'דניאל אברהם',phone:'0504444444',address:'ניב דוד 44',note:'',active:false,cancelled:false,delivered:false,paid:false,wait:true,problem:false}];
let clients=JSON.parse(localStorage.getItem(STORAGE)||localStorage.getItem('erev10_clients_v1')||'null')||starter;
function toast(t){const x=document.getElementById('toast');x.textContent=t;x.style.display='block';setTimeout(()=>x.style.display='none',2200)}
function save(){localStorage.setItem(STORAGE,JSON.stringify(clients));render();renderCourier()}
function isLocked(){return new Date().getHours()>=12}
function statusText(){lockPill.textContent=isLocked()?'🔒 נסגר להיום':'🟢 פתוח עד 12:00';dateText.textContent=new Date().toLocaleDateString('he-IL')}
function todayActive(){return clients.filter(c=>c.active&&!c.wait&&!c.cancelled).sort((a,b)=>a.address.localeCompare(b.address,'he',{numeric:true}))}
function filtered(){const q=(search.value||'').trim();return clients.filter(c=>{if(filter==='today'&&!(c.active&&!c.wait&&!c.cancelled))return false;if(filter==='cancelled'&&!c.cancelled)return false;if(filter==='unpaid'&&(c.paid||c.wait))return false;if(filter==='wait'&&!c.wait)return false;if(!q)return true;return (c.name+c.phone+c.address+c.note).includes(q)}).sort((a,b)=>a.address.localeCompare(b.address,'he',{numeric:true}))}
function render(){statusText();const active=todayActive(),del=active.filter(c=>c.delivered).length;activeCount.textContent=active.length+'/50';bunsCount.textContent=active.length*10;deliveredCount.textContent=del;leftCount.textContent=active.length-del;unpaidCount.textContent=clients.filter(c=>!c.paid&&!c.wait).length;clientsList.innerHTML=filtered().map(c=>card(c)).join('')||'<div class="client"><b>אין נתונים במסנן הזה</b></div>'}
function card(c){let st=c.wait?'המתנה':c.cancelled?'ביטל':c.problem?'בעיה':c.delivered?'נמסר':'ממתין', cls=c.wait?'yellow':c.cancelled||c.problem?'red':c.delivered?'green':'yellow';let phone='972'+c.phone.replace(/\D/g,'').replace(/^0/,'');return `<div class="client ${c.delivered?'done':''} ${c.cancelled?'cancelled':''} ${c.wait?'wait':''}"><div class="line"><div><div class="name">${c.name}</div><div class="meta">📍 ${c.address}</div>${c.note?`<div class="meta">📝 ${c.note}</div>`:''}</div><div class="tag ${cls}">${st}</div></div><div class="cardActions"><button class="mini greenBtn" onclick="toggleDelivered(${c.id})">${c.delivered?'בטל נמסר':'נמסר'}</button><button class="mini redBtn" onclick="toggleCancel(${c.id})">${c.cancelled?'החזר':'היום לא'}</button><a class="mini" href="tel:${c.phone}">התקשר</a></div><div class="cardActions"><button class="mini" onclick="togglePaid(${c.id})">${c.paid?'שולם':'לא שילם'}</button><button class="mini" onclick="toggleWait(${c.id})">${c.wait?'אשר':'המתנה'}</button><a class="mini" href="https://wa.me/${phone}" target="_blank">וואטסאפ</a></div></div>`}
function setFilter(f,el){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render()}
function find(id){return clients.find(c=>c.id===id)}function toggleDelivered(id){let c=find(id);c.delivered=!c.delivered;if(c.delivered){c.problem=false;c.cancelled=false}save()}function toggleCancel(id){let c=find(id);if(isLocked()&&!c.cancelled){alert('אחרי 12:00 אי אפשר לבטל להיום');return}c.cancelled=!c.cancelled;if(c.cancelled)c.delivered=false;save()}function togglePaid(id){find(id).paid=!find(id).paid;save()}function toggleWait(id){let c=find(id);c.wait=!c.wait;c.active=!c.wait;save()}
function toggleAdd(){addBox.style.display=addBox.style.display==='block'?'none':'block'}
function addClient(){let name=newName.value.trim(),phone=newPhone.value.trim(),address=newAddress.value.trim();if(!name||!phone||!address){alert('חסר שם, טלפון או כתובת');return}let count=clients.filter(c=>c.active&&!c.wait).length;clients.push({id:Date.now(),name,phone,address,note:newNote.value.trim(),active:count<50,cancelled:false,delivered:false,paid:false,wait:count>=50,problem:false});newName.value=newPhone.value=newAddress.value=newNote.value='';addBox.style.display='none';save();toast(count<50?'הלקוח נוסף':'נוסף לרשימת המתנה')}
function sendBakery(){let qty=todayActive().length*10;let d=new Date().toLocaleDateString('he-IL');let msg=`שלום, להיום ${d} בערב צריך להכין ${qty} לחמניות לערב 10. תודה.`;window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank')}
function openCourier(){courierBox.style.display='block';courierIndex=0;renderCourier();courierBox.scrollIntoView({behavior:'smooth'})}function closeCourier(){courierBox.style.display='none'}function courierList(){return todayActive().filter(c=>!c.delivered)}function renderCourier(){let l=courierList();if(!l.length){cAddr.textContent='סיימת הכל ✅';cName.textContent='אין משלוחים פתוחים';cNote.textContent='';return}let c=l[Math.min(courierIndex,l.length-1)];cAddr.textContent=c.address;cName.textContent=c.name;cNote.textContent=c.note||'אין הערות'}function courierDone(){let l=courierList();if(!l.length)return;let c=l[Math.min(courierIndex,l.length-1)];c.delivered=true;c.problem=false;save();toast('סומן נמסר')}function courierProblem(){let l=courierList();if(!l.length)return;let c=l[Math.min(courierIndex,l.length-1)];c.problem=true;save();toast('סומן כבעיה')}
function resetDay(){if(!confirm('לאפס סימוני נמסר/בעיה של היום?'))return;clients.forEach(c=>{c.delivered=false;c.problem=false;c.cancelled=false});save();toast('הערב אופס')}
render();setInterval(statusText,30000);
</script>
</body></html>
