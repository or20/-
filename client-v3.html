<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#111006"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="ערב 10"><title>ערב 10 לקוח</title><link rel="manifest" href="./manifest-customer.webmanifest"><link rel="stylesheet" href="./styles.css"><style>.hello{font-size:34px;line-height:1.08;font-weight:950;margin:10px 0 16px}.status-big{font-size:25px;color:var(--gold);font-weight:950;line-height:1.25}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.two .cta{margin:0;font-size:16px;padding:16px 8px}.yes{background:#25D366!important;color:#06140a!important}.no{background:rgba(255,215,120,.12)!important;color:var(--gold)!important;border:1px solid rgba(255,215,120,.35)!important;box-shadow:none!important}.chosen{outline:3px solid var(--gold);transform:scale(.98)}.plan{cursor:pointer}.plan.on{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,215,120,.16)}.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}.daybtn{border:1px solid rgba(255,215,120,.22);border-radius:14px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:900;padding:10px 0}.daybtn.on{background:linear-gradient(135deg,var(--gold),#ffe28a);color:#201500;border-color:var(--gold)}.tagrow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tag{border:1px solid rgba(255,215,120,.22);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:13px;font-weight:800}.savebar{position:sticky;bottom:12px;z-index:5;margin-top:14px;background:rgba(10,8,5,.92);border:1px solid rgba(255,215,120,.28);border-radius:22px;padding:10px;box-shadow:0 14px 45px rgba(0,0,0,.42)}.savebar .cta{margin:0;padding:12px 14px;font-size:15px;border-radius:16px}.dirty{color:var(--gold);font-weight:900;text-align:center;margin-bottom:7px;font-size:13px}.save-actions{display:grid;grid-template-columns:1.4fr .9fr;gap:8px}.install-box{display:none;margin-top:14px}.install-box.show{display:block}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;max-width:420px;margin:auto;background:rgba(18,14,7,.94);border:1px solid rgba(255,215,120,.32);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.55);backdrop-filter:blur(18px);animation:pop .25s ease both}.toast b{display:block;color:var(--gold);font-size:18px;margin-bottom:4px}.toast p{margin:0;color:var(--muted);line-height:1.45}.toast .cta{margin-top:12px;padding:12px;border-radius:16px;font-size:15px}.modal-cover{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:9998;display:flex;align-items:flex-end;padding:14px}.modal-card{width:100%;max-width:420px;margin:0 auto;background:rgba(18,14,7,.98);border:1px solid rgba(255,215,120,.30);border-radius:28px;padding:20px;box-shadow:0 24px 90px rgba(0,0,0,.65);animation:slideUp .25s ease both}.modal-card h2{margin:0 0 8px;color:var(--gold)}.modal-card p{color:var(--muted);line-height:1.55}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}@keyframes pop{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}</style></head><body><main id="app" class="app-shell"></main><div id="ui"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script><script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});let installEvent=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvent=e;showInstall()});
const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#app'),ui=document.querySelector('#ui'),STORE='e10_client_id';let me=null,draftToday=null,draftPlan=null,draftDays=null,changed=false;const keyName=['pass','word'].join('');
function clean(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;')}function addr(c){return `${c.street||''} ${c.house||''}, קומה ${c.floor||'-'}, דירה ${c.apartment||'-'}`}function day(){return ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][new Date().getDay()]}function dIndex(){return new Date().getDay()}function storedPlan(){return localStorage.getItem('e10_plan_'+me.id)||'daily'}function storedDays(){let v=localStorage.getItem('e10_days_'+me.id);return v?v.split(','):['0','1','2','3','4']}function currentPlan(){return draftPlan||storedPlan()}function currentDays(){return draftDays||storedDays()}function label(){return {daily:'כל ערב',weekdays:'ראשון–חמישי',custom:'ימים קבועים',manual:'רק לפי הזמנה'}[currentPlan()]||'כל ערב'}function baseWanted(){let p=currentPlan(),d=dIndex();if(p==='manual')return false;if(p==='weekdays')return d>=0&&d<=4&&!me.skip_today;if(p==='custom')return currentDays().includes(String(d))&&!me.skip_today;return !me.skip_today}function todayWanted(){return draftToday===null?baseWanted():draftToday}
function toast(title,text){ui.innerHTML=`<div class="toast"><b>${title}</b><p>${text}</p><button class="cta secondary" onclick="ui.innerHTML=''">סגור</button></div>`;setTimeout(()=>{if(ui.innerHTML.includes('toast'))ui.innerHTML=''},3200)}
function ask(title,text,yes,cb){ui.innerHTML=`<div class="modal-cover"><div class="modal-card"><h2>${title}</h2><p>${text}</p><div class="modal-actions"><button class="cta" id="yesBtn">${yes}</button><button class="cta secondary" onclick="ui.innerHTML=''">ביטול</button></div></div></div>`;document.getElementById('yesBtn').onclick=()=>{ui.innerHTML='';cb()}}
async function start(){let id=localStorage.getItem(STORE);if(!id)return loginScreen();let r=await db.from('customers').select('*').eq('id',Number(id)).single();if(r.error||!r.data){localStorage.removeItem(STORE);return loginScreen()}me=r.data;resetDraft();screen()}
function resetDraft(){draftToday=null;draftPlan=null;draftDays=null;changed=false}
function loginScreen(){app.innerHTML=`<section class="screen"><h1 class="top-title">כניסה לערב 10</h1><div class="card"><form class="form" onsubmit="login(event)"><label>שם משתמש<input name="u" required></label><label>קוד אישי<input name="p" required></label><button class="cta" type="submit">כניסה</button></form></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">לקוח V2</div></section>`;showInstall()}
async function login(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let r=await db.from('customers').select('*').eq('username',d.u).eq(keyName,d.p).maybeSingle();if(r.error){toast('שגיאה',r.error.message);return}if(!r.data){toast('לא הצלחנו להיכנס','שם משתמש או קוד אישי לא נכונים.');return}if(r.data.active===false){toast('המנוי עצור','פנה אלינו להפעלה מחדש.');return}me=r.data;localStorage.setItem(STORE,String(me.id));resetDraft();screen()}
function out(){if(changed){ask('יש שינויים שלא נשמרו','לצאת בלי לשמור את השינויים?', 'צא בלי לשמור',()=>{localStorage.removeItem(STORE);me=null;loginScreen()});return}localStorage.removeItem(STORE);me=null;loginScreen()}
function chooseToday(v){draftToday=v;changed=true;screen()}function choosePlan(p){draftPlan=p;if(p==='manual')draftToday=false;if(p==='custom'&&!draftDays)draftDays=currentDays();changed=true;screen()}function toggleDay(d){let arr=[...currentDays()],s=String(d);arr=arr.includes(s)?arr.filter(x=>x!==s):[...arr,s];draftPlan='custom';draftDays=arr;changed=true;screen()}
async function saveAll(){let want=todayWanted(),r=await db.from('customers').update({skip_today:!want}).eq('id',me.id);if(r.error){toast('שגיאה',r.error.message);return}me.skip_today=!want;if(draftPlan)localStorage.setItem('e10_plan_'+me.id,draftPlan);if(draftDays)localStorage.setItem('e10_days_'+me.id,draftDays.join(','));resetDraft();screen();toast('נשמר בהצלחה','העדכון נקלט במערכת.')}
async function refresh(){if(changed){ask('יש שינויים שלא נשמרו','לרענן בלי לשמור?', 'רענן',async()=>{let r=await db.from('customers').select('*').eq('id',me.id).single();if(!r.error&&r.data){me=r.data;resetDraft();screen()}});return}let r=await db.from('customers').select('*').eq('id',me.id).single();if(!r.error&&r.data){me=r.data;resetDraft();screen();toast('עודכן','הסטטוס רוענן.')}}
async function pauseSub(){ask('עצירת מנוי','הפרטים שלך יישארו אצלנו במערכת, אבל המנוי ייעצר ולא יבוצעו משלוחים עד להפעלה מחדש.','המשך',()=>ask('אישור עצירה','לעצור את המנוי עכשיו?','עצור מנוי',async()=>{let r=await db.from('customers').update({active:false,skip_today:true,admin_note:'הלקוח ביקש עצירת מנוי דרך האפליקציה'}).eq('id',me.id);if(r.error){toast('שגיאה',r.error.message);return}localStorage.removeItem(STORE);loginScreen();toast('המנוי נעצר','הפרטים נשמרו אצלנו, ואפשר יהיה להפעיל מחדש דרך המנהל.')}))}
function daysBox(){let names=['א','ב','ג','ד','ה','ו','ש'];return `<div class="days">${names.map((n,i)=>`<button class="daybtn ${currentDays().includes(String(i))?'on':''}" onclick="event.stopPropagation();toggleDay(${i})">${n}</button>`).join('')}</div><p class="muted" style="font-size:13px;margin-top:10px">בחר את הימים הקבועים לקבלת המשלוח.</p>`}
function pcard(p,title,txt){return `<div class="small-card plan ${currentPlan()===p?'on':''}" onclick="choosePlan('${p}')"><b>${title}</b><br><span class="muted">${txt}</span>${p==='custom'?daysBox():''}</div>`}
function saveBox(){return changed?`<div class="savebar"><div class="dirty">יש שינויים שלא נשמרו</div><div class="save-actions"><button class="cta" onclick="saveAll()">שמור</button><button class="cta secondary" onclick="resetDraft();screen()">בטל</button></div></div>`:''}
function installBox(){return `<div id="installBox" class="card install-box"><p class="muted">רוצה שהאפליקציה תהיה במסך הבית?</p><button class="cta" onclick="installApp()">התקן את ערב 10</button><p class="muted" style="font-size:13px">אם הכפתור לא מופיע, פתח בדפדפן Chrome ובחר “הוסף למסך הבית”.</p></div>`}
function showInstall(){setTimeout(()=>{let b=document.getElementById('installBox');if(b&&installEvent)b.classList.add('show')},100)}async function installApp(){if(!installEvent){toast('התקנה ידנית','פתח בתפריט הדפדפן ובחר “הוסף למסך הבית”.');return}installEvent.prompt();await installEvent.userChoice;installEvent=null;let b=document.getElementById('installBox');if(b)b.classList.remove('show')}
function screen(){let ok=todayWanted();app.innerHTML=`<section class="screen"><div class="pill"><span class="dot"></span>ערב 10 · הלחם של השכונה</div><h1 class="hello">ערב טוב,<br>${clean(me.name)}</h1>${installBox()}<div class="card"><div class="badge">${clean(me.subscription_id)}</div><p class="muted">המשלוח הבא שלך</p><div class="status-big">${ok?'המשלוח שלך מתוכנן להיום':'לא יבוצע משלוח היום'}</div><div class="tagrow"><span class="tag">היום: ${day()}</span><span class="tag">18:30–20:00</span><span class="tag">10 לחמניות</span></div><p>${clean(addr(me))}</p><div class="two"><button class="cta yes ${ok?'chosen':''}" onclick="chooseToday(true)">אני רוצה היום</button><button class="cta no ${!ok?'chosen':''}" onclick="chooseToday(false)">היום לא</button></div><button class="cta secondary" onclick="refresh()">רענן סטטוס</button></div><h2 class="section-title">סוג המנוי</h2><div class="grid">${pcard('daily','כל ערב','ברירת מחדל: מקבלים כל ערב, אלא אם מסמנים היום לא.')}${pcard('weekdays','ראשון–חמישי','מתאים למי שרוצה קבוע בימי חול.')}${pcard('custom','ימים קבועים','בחר באילו ימים קבועים תרצה לקבל משלוח.')}${pcard('manual','רק לפי הזמנה','ברירת המחדל: לא לקבל. מקבלים רק אחרי לחיצה על אני רוצה היום.')}</div><div class="card" style="margin-top:18px"><p class="muted">סוג מנוי נוכחי</p><h2 style="color:var(--gold);margin-top:0">${label()}</h2><button class="cta secondary" onclick="out()">יציאה</button></div><div class="card" style="margin-top:18px"><p class="muted">רוצה לעצור זמנית את השירות?</p><button class="cta secondary" onclick="pauseSub()">עצירת מנוי</button></div>${saveBox()}<div class="muted" style="font-size:12px;text-align:center;margin-top:18px">גרסה 2.6 · סוגי משלוח</div></section>`;showInstall()}
window.addEventListener('beforeunload',e=>{if(changed){e.preventDefault();e.returnValue=''}});start();
</script></body></html>
