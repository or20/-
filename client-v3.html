<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta name="theme-color" content="#111006"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="ערב 10"><title>ערב 10 לקוח</title><link rel="manifest" href="./manifest-customer.webmanifest"><link rel="stylesheet" href="./styles.css"><style>body{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}.hello{font-size:34px;line-height:1.08;font-weight:950;margin:10px 0 16px}.status-big{font-size:25px;color:var(--gold);font-weight:950;line-height:1.25}.status-note{margin-top:10px;font-size:15px;line-height:1.5}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.two .cta{margin:0;font-size:16px;padding:16px 8px}.yes{background:#25D366!important;color:#06140a!important}.no{background:rgba(255,215,120,.12)!important;color:var(--gold)!important;border:1px solid rgba(255,215,120,.35)!important;box-shadow:none!important}.chosen{outline:3px solid var(--gold);transform:scale(.98)}.lockedBtn{opacity:.45;filter:grayscale(.4)}.plan{cursor:pointer}.plan.on{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,215,120,.16)}.days{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:12px}.daybtn{border:1px solid rgba(255,215,120,.22);border-radius:14px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:900;padding:10px 0}.daybtn.on{background:linear-gradient(135deg,var(--gold),#ffe28a);color:#201500;border-color:var(--gold)}.tagrow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tag{border:1px solid rgba(255,215,120,.22);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:13px;font-weight:800}.savebar{position:sticky;bottom:12px;z-index:5;margin-top:14px;background:rgba(10,8,5,.92);border:1px solid rgba(255,215,120,.28);border-radius:22px;padding:10px;box-shadow:0 14px 45px rgba(0,0,0,.42)}.savebar .cta{margin:0;padding:12px 14px;font-size:15px;border-radius:16px}.save-actions{display:grid;grid-template-columns:1.4fr .9fr;gap:8px}.smallDanger{background:rgba(255,70,70,.10)!important;color:#ff9b9b!important;border:1px solid rgba(255,70,70,.34)!important;box-shadow:none!important;font-size:14px!important;padding:11px 14px!important;border-radius:16px!important;width:auto!important;margin-top:10px!important}.install-box{display:none;margin-top:14px}.install-box.show{display:block}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;max-width:420px;margin:auto;background:rgba(18,14,7,.94);border:1px solid rgba(255,215,120,.32);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.55)}.toast b{display:block;color:var(--gold);font-size:18px;margin-bottom:4px}.credit{text-align:center;margin:22px 0 4px;font-size:12px}.credit a{color:var(--muted);text-decoration:none}</style></head><body><main id="app" class="app-shell"></main><div id="ui"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script><script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
let installEvent=null,statusTimer=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvent=e;showInstall()});

const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#app'),ui=document.querySelector('#ui'),STORE='e10_client_id',keyName=['pass','word'].join('');
let me=null,draftToday=null,draftPlan=null,draftDays=null,changed=false;

function clean(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;')}
function addr(c){return `${c.street||''} ${c.house||''}, קומה ${c.floor||'-'}, דירה ${c.apartment||'-'}`}
function dIndex(){return new Date().getDay()}
function dayName(){return ['ראשון','שני','שלישי','רביעי','חמישי','שישי','מוצ״ש'][dIndex()]}
function noFriday(){return dIndex()!==5}
function planKey(){return 'e10_plan_'+me.id}
function daysKey(){return 'e10_days_'+me.id}
function initKey(){return 'e10_initialized_'+me.id}
function storedPlan(){return localStorage.getItem(planKey())||'daily'}
function storedDays(){let v=localStorage.getItem(daysKey());return v?v.split(','):['0','1','2','3','4','6']}
function currentPlan(){return draftPlan||storedPlan()}
function currentDays(){return draftDays||storedDays()}
function label(){return {daily:'כל ערב',custom:'ימים קבועים',manual:'רק לפי הזמנה'}[currentPlan()]||'כל ערב'}
function baseWanted(){let p=currentPlan();if(!noFriday())return false;if(p==='manual')return false;if(p==='custom')return currentDays().includes(String(dIndex()))&&!me.skip_today;return !me.skip_today}
function todayWanted(){return draftToday===null?baseWanted():draftToday}

function nowMin(){let d=new Date();return d.getHours()*60+d.getMinutes()}
function locked(){return nowMin()>=720}
function countdown(){
  let n=nowMin(),left=Math.max(0,720-n),h=Math.floor(left/60),m=left%60;
  if(left<=0)return '';
  return `⏳ נותרו ${h? h+' שעות ו־':''}${m} דקות לבצע שינויים להיום`;
}
function statusText(ok){
  let n=nowMin();
  if(!noFriday())return {title:'❌ אין חלוקה היום',note:'אין משלוחים ביום שישי.'};
  if(n<720)return ok
    ? {title:'🥖 ההזמנה שלך להיום מאושרת',note:countdown()}
    : {title:'❌ אין לך הזמנה להיום',note:'אם תרצה להצטרף למשלוח של היום, לחץ על “אני רוצה היום” לפני 12:00.\n'+countdown()};
  if(n<780)return ok
    ? {title:'🔒 ההזמנה שלך להיום נסגרה',note:'ההזמנה מאושרת ותישלח למאפייה בשעה 13:00.'}
    : {title:'❌ אין לך הזמנה להיום',note:'ההזמנה להיום נסגרה בשעה 12:00. נשמח לקבל את ההזמנה שלך למחר.'};
  return ok
    ? {title:'🥖 ההזמנה שלך נשלחה למאפייה',note:'המשלוח יגיע היום בין 18:30–20:00.'}
    : {title:'❌ אין לך הזמנה להיום',note:'ההזמנה להיום נסגרה. נשמח לקבל את ההזמנה שלך למחר.'};
}
function updateStatusOnly(){
  if(!me)return;
  let ok=todayWanted(),st=statusText(ok),isLocked=locked();
  let title=document.getElementById('statusTitle'),note=document.getElementById('statusNote');
  let yes=document.getElementById('yesBtn'),no=document.getElementById('noBtn');
  if(title)title.innerHTML=st.title;
  if(note)note.innerHTML=clean(st.note).replaceAll('\n','<br>');
  if(yes){yes.className=`cta yes ${ok?'chosen':''} ${isLocked?'lockedBtn':''}`;}
  if(no){no.className=`cta no ${!ok?'chosen':''} ${isLocked?'lockedBtn':''}`;}
}
function startStatusTimer(){
  clearInterval(statusTimer);
  statusTimer=setInterval(updateStatusOnly,30000);
}

function toast(t,s){ui.innerHTML=`<div class="toast"><b>${t}</b><p class="muted">${s||''}</p><button class="cta secondary" onclick="ui.innerHTML=''">סגור</button></div>`;setTimeout(()=>ui.innerHTML='',3000)}
function resetDraft(){draftToday=null;draftPlan=null;draftDays=null;changed=false}

async function start(){let id=localStorage.getItem(STORE);if(!id)return loginScreen();let r=await db.from('customers').select('*').eq('id',Number(id)).single();if(r.error||!r.data){localStorage.removeItem(STORE);return loginScreen()}me=r.data;await ensureDefault();resetDraft();screen()}
async function ensureDefault(){if(localStorage.getItem(initKey())==='1')return;localStorage.setItem(planKey(),'daily');localStorage.setItem(initKey(),'1');me.skip_today=false;await db.from('customers').update({skip_today:false}).eq('id',me.id)}
function loginScreen(){clearInterval(statusTimer);app.innerHTML=`<section class="screen"><h1 class="top-title">כניסה לערב 10</h1><div class="card"><form class="form" onsubmit="login(event)"><label>שם משתמש<input name="u" required></label><label>קוד אישי<input name="p" required></label><button class="cta" type="submit">כניסה</button></form></div><div class="credit"><a href="https://share.google/HUoheAjuVnUKozsP8">מבית zagzagwebs</a></div></section>`;showInstall()}
async function login(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let r=await db.from('customers').select('*').eq('username',d.u).eq(keyName,d.p).maybeSingle();if(r.error)return toast('שגיאה',r.error.message);if(!r.data)return toast('לא הצלחנו להיכנס','שם משתמש או קוד אישי לא נכונים.');if(r.data.active===false)return toast('המנוי עצור','פנה אלינו להפעלה מחדש.');me=r.data;localStorage.setItem(STORE,String(me.id));await ensureDefault();resetDraft();screen()}
function out(){localStorage.removeItem(STORE);me=null;loginScreen()}
function chooseToday(v){if(locked())return toast('ההזמנה להיום נסגרה','אפשר לבצע שינויים עד 12:00.');draftToday=v;changed=true;screen()}
function choosePlan(p){draftPlan=p;if(p==='manual')draftToday=false;if(p==='daily')draftToday=true;if(p==='custom'&&!draftDays)draftDays=currentDays();changed=true;screen()}
function toggleDay(d){let a=[...currentDays()],s=String(d);a=a.includes(s)?a.filter(x=>x!==s):[...a,s];draftPlan='custom';draftDays=a;draftToday=a.includes(String(dIndex()))&&noFriday();changed=true;screen()}
async function saveAll(){if(locked())return toast('ההזמנה להיום נסגרה','שינויים להיום אפשריים עד 12:00 בלבד.');let want=todayWanted(),r=await db.from('customers').update({skip_today:!want}).eq('id',me.id);if(r.error)return toast('שגיאה',r.error.message);me.skip_today=!want;if(draftPlan)localStorage.setItem(planKey(),draftPlan);if(draftDays)localStorage.setItem(daysKey(),draftDays.join(','));localStorage.setItem(initKey(),'1');resetDraft();screen();toast('נשמר בהצלחה','העדכון נקלט במערכת.')}
async function refresh(){let r=await db.from('customers').select('*').eq('id',me.id).single();if(!r.error&&r.data){me=r.data;resetDraft();screen();toast('עודכן','הסטטוס רוענן.')}}
async function pauseSub(){if(!confirm('לעצור את המנוי עכשיו?'))return;let r=await db.from('customers').update({active:false,skip_today:true,admin_note:'הלקוח ביקש עצירת מנוי דרך האפליקציה'}).eq('id',me.id);if(r.error)return toast('שגיאה',r.error.message);localStorage.removeItem(STORE);loginScreen();toast('המנוי נעצר','הפרטים נשמרו אצלנו.')}

function daysBox(){let items=[['0','א'],['1','ב'],['2','ג'],['3','ד'],['4','ה'],['6','מוצ״ש']];return `<div class="days">${items.map(([i,n])=>`<button class="daybtn ${currentDays().includes(i)?'on':''}" onclick="event.stopPropagation();toggleDay(${i})">${n}</button>`).join('')}</div><p class="muted" style="font-size:13px;margin-top:10px">אין חלוקה ביום שישי. ביום שנבחר ברירת המחדל היא לקבל.</p>`}
function pcard(p,t,x){return `<div class="small-card plan ${currentPlan()===p?'on':''}" onclick="choosePlan('${p}')"><b>${t}</b><br><span class="muted">${x}</span>${p==='custom'?daysBox():''}</div>`}
function saveBox(){return changed?`<div class="savebar"><div style="color:var(--gold);font-weight:900;text-align:center;margin-bottom:7px;font-size:13px">יש שינויים שלא נשמרו</div><div class="save-actions"><button class="cta" onclick="saveAll()">שמור</button><button class="cta secondary" onclick="resetDraft();screen()">בטל</button></div></div>`:''}
function installBox(){return `<div id="installBox" class="card install-box"><p class="muted">רוצה שהאפליקציה תהיה במסך הבית?</p><button class="cta" onclick="installApp()">התקן את ערב 10</button><p class="muted" style="font-size:13px">בחר “התקנה” ולא “יצירת קיצור דרך”.</p></div>`}
function showInstall(){setTimeout(()=>{let b=document.getElementById('installBox');if(b&&installEvent)b.classList.add('show')},100)}
async function installApp(){if(!installEvent)return toast('התקנה ידנית','פתח בתפריט הדפדפן ובחר “התקנה”. לא לבחור “יצירת קיצור דרך”.');installEvent.prompt();await installEvent.userChoice;installEvent=null;showInstall()}

function screen(){
  let ok=todayWanted(),st=statusText(ok),isLocked=locked();
  app.innerHTML=`<section class="screen"><div class="pill"><span class="dot"></span>ערב 10 · הלחם של השכונה</div><h1 class="hello">ערב טוב,<br>${clean(me.name)}</h1>${installBox()}<div class="card"><p class="muted" style="font-size:12px;margin:0 0 4px">מס׳ לקוח</p><div class="badge">${clean(me.subscription_id)}</div><p class="muted">הסטטוס שלך להיום</p><div id="statusTitle" class="status-big">${st.title}</div><p id="statusNote" class="muted status-note">${clean(st.note).replaceAll('\n','<br>')}</p><div class="tagrow"><span class="tag">היום: ${dayName()}</span><span class="tag">שינויים עד 12:00</span><span class="tag">שליחה למאפייה 13:00</span><span class="tag">18:30–20:00</span><span class="tag">10 לחמניות</span></div><p>${clean(addr(me))}</p><div class="two"><button id="yesBtn" class="cta yes ${ok?'chosen':''} ${isLocked?'lockedBtn':''}" onclick="chooseToday(true)">אני רוצה היום</button><button id="noBtn" class="cta no ${!ok?'chosen':''} ${isLocked?'lockedBtn':''}" onclick="chooseToday(false)">היום לא</button></div><button class="cta secondary" onclick="refresh()">רענן סטטוס</button></div><h2 class="section-title">סוג המנוי</h2><div class="grid">${pcard('daily','כל ערב','ברירת המחדל היא לקבל בכל יום חלוקה. אין חלוקה ביום שישי.')}${pcard('custom','ימים קבועים','בחר ימים קבועים. ביום שנבחר ברירת המחדל היא לקבל.')}${pcard('manual','רק לפי הזמנה','ברירת המחדל: לא לקבל. מקבלים רק אחרי לחיצה על אני רוצה היום.')}</div><div class="card" style="margin-top:18px"><p class="muted">סוג מנוי נוכחי</p><h2 style="color:var(--gold);margin-top:0">${label()}</h2><button class="cta secondary" onclick="out()">יציאה</button></div><div class="card" style="margin-top:18px"><p class="muted">רוצה לעצור זמנית את השירות?</p><button class="cta smallDanger" onclick="pauseSub()">עצירת מנוי</button></div>${saveBox()}<div class="credit"><a href="https://share.google/HUoheAjuVnUKozsP8">מבית zagzagwebs</a></div><div class="muted" style="font-size:12px;text-align:center;margin-top:8px">גרסה 3.3 · שעון חי ללקוח</div></section>`;
  showInstall();
  startStatusTimer();
}
start();
</script></body></html>
