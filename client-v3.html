<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#111006"><title>ערב 10 לקוח V2</title><link rel="stylesheet" href="./styles.css"><style>.hello{font-size:34px;line-height:1.08;font-weight:950;margin:10px 0 16px}.status-big{font-size:25px;color:var(--gold);font-weight:950;line-height:1.25}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.two .cta{margin:0;font-size:16px;padding:16px 8px}.yes{background:#25D366!important;color:#06140a!important}.no{background:rgba(255,215,120,.12)!important;color:var(--gold)!important;border:1px solid rgba(255,215,120,.35)!important;box-shadow:none!important}.plan{cursor:pointer}.plan.on{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,215,120,.16)}.tagrow{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tag{border:1px solid rgba(255,215,120,.22);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:13px;font-weight:800}</style></head><body><main id="app" class="app-shell"></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script><script>
const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#app'),STORE='e10_client_id';let me=null;const keyName=['pass','word'].join('');
function clean(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;')}function addr(c){return `${c.street||''} ${c.house||''}, קומה ${c.floor||'-'}, דירה ${c.apartment||'-'}`}function day(){return ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][new Date().getDay()]}function plan(){return localStorage.getItem('e10_plan_'+me.id)||'daily'}function label(){return {daily:'כל ערב',weekdays:'ראשון–חמישי',custom:'ימים קבועים',manual:'רק לפי הזמנה'}[plan()]||'כל ערב'}
async function start(){let id=localStorage.getItem(STORE);if(!id)return loginScreen();let r=await db.from('customers').select('*').eq('id',Number(id)).single();if(r.error||!r.data){localStorage.removeItem(STORE);return loginScreen()}me=r.data;screen()}
function loginScreen(){app.innerHTML=`<section class="screen"><h1 class="top-title">כניסה לערב 10</h1><div class="card"><form class="form" onsubmit="login(event)"><label>שם משתמש<input name="u" required></label><label>קוד אישי<input name="p" required></label><button class="cta" type="submit">כניסה</button></form></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">לקוח V2</div></section>`}
async function login(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let r=await db.from('customers').select('*').eq('username',d.u).eq(keyName,d.p).maybeSingle();if(r.error){alert(r.error.message);return}if(!r.data){alert('שם משתמש או קוד אישי לא נכונים');return}me=r.data;localStorage.setItem(STORE,String(me.id));screen()}
function out(){localStorage.removeItem(STORE);me=null;loginScreen()}async function setToday(v){let r=await db.from('customers').update({skip_today:!v}).eq('id',me.id);if(r.error){alert(r.error.message);return}me.skip_today=!v;alert(v?'המשלוח מאושר להיום.':'קיבלנו, לא נשלח היום.');screen()}function setPlan(p){localStorage.setItem('e10_plan_'+me.id,p);if(p==='manual')setToday(false);else screen()}async function refresh(){let r=await db.from('customers').select('*').eq('id',me.id).single();if(!r.error&&r.data){me=r.data;screen()}}
function pcard(p,title,txt){return `<div class="small-card plan ${plan()===p?'on':''}" onclick="setPlan('${p}')"><b>${title}</b><br><span class="muted">${txt}</span></div>`}
function screen(){let ok=!me.skip_today;app.innerHTML=`<section class="screen"><div class="pill"><span class="dot"></span>ערב 10 · הלחם של השכונה</div><h1 class="hello">ערב טוב,<br>${clean(me.name)}</h1><div class="card"><div class="badge">${clean(me.subscription_id)}</div><p class="muted">המשלוח הבא שלך</p><div class="status-big">${ok?'המשלוח שלך מתוכנן להיום':'לא יבוצע משלוח היום'}</div><div class="tagrow"><span class="tag">היום: ${day()}</span><span class="tag">18:30–20:00</span><span class="tag">10 לחמניות</span></div><p>${clean(addr(me))}</p><div class="two"><button class="cta yes" onclick="setToday(true)">אני רוצה היום</button><button class="cta no" onclick="setToday(false)">היום לא</button></div><button class="cta secondary" onclick="refresh()">רענן סטטוס</button></div><h2 class="section-title">סוג המנוי</h2><div class="grid">${pcard('daily','כל ערב','ברירת מחדל: מקבלים כל ערב, אלא אם מסמנים היום לא.')}${pcard('weekdays','ראשון–חמישי','מתאים למי שרוצה קבוע בימי חול.')}${pcard('custom','ימים קבועים','בשלב הזה הבחירה נשמרת באפליקציה.')}${pcard('manual','רק לפי הזמנה','לא נשלח אוטומטית. לוחצים אני רוצה היום.')}</div><div class="card" style="margin-top:18px"><p class="muted">סוג מנוי נוכחי</p><h2 style="color:var(--gold);margin-top:0">${label()}</h2><button class="cta secondary" onclick="out()">יציאה</button></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">גרסה 2.0 · לקוח</div></section>`}
start();
</script></body></html>
