<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#111006"><title>הצטרפות לערב 10</title><link rel="manifest" href="./manifest-customer.webmanifest"><link rel="stylesheet" href="./styles.css"><style>.step{display:none}.step.on{display:block}.hero-title{font-size:42px;line-height:1.05;margin:12px 0;font-weight:950}.cred{font-size:28px;color:var(--gold);font-weight:950;background:rgba(255,215,120,.08);border:1px solid rgba(255,215,120,.26);border-radius:20px;padding:14px;text-align:center}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;max-width:420px;margin:auto;background:rgba(18,14,7,.94);border:1px solid rgba(255,215,120,.32);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.55)}.install-box{display:none}.install-box.show{display:block}.mini{font-size:13px;color:var(--muted);line-height:1.5}</style></head><body><main id="app" class="app-shell"></main><div id="ui"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script><script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});let installEvent=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();installEvent=e;showInstall()});
const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#app'),ui=document.querySelector('#ui'),passCol=['pass','word'].join('');let account=null;
function clean(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;')}function toast(t){ui.innerHTML=`<div class="toast">${t}</div>`;setTimeout(()=>ui.innerHTML='',3000)}function userFromPhone(p){let d=String(p||'').replace(/\D/g,'').slice(-4);return 'e10'+d+Math.floor(10+Math.random()*89)}function pin(){return String(Math.floor(1000+Math.random()*9000))}function nextSub(){return 'E10-'+String(Date.now()).slice(-4)}
function home(){app.innerHTML=`<section class="screen hero"><div class="pill"><span class="dot"></span>הצטרפות לשירות</div><h1 class="hero-title"><span class="gold">ערב 10</span><br>הלחם של השכונה</h1><div class="subtitle">10 לחמניות טריות עד דלת הבית בכל ערב</div><div class="card price-card"><div class="badge">מבצע השקה לחודש יולי</div><div class="price">₪20</div><p class="muted">ליום לנרשמים במהלך חודש יולי בלבד</p><div class="divider"></div><p>לא צריך לרדת למאפייה. לא צריך לעמוד בתור. השירות מגיע עד הדלת.</p></div><button class="cta" onclick="form()">הצטרפו עכשיו</button><a class="cta secondary" style="display:block;text-align:center;text-decoration:none" href="./join.html">חזרה לדף ההסבר</a></section>`}
function form(){app.innerHTML=`<section class="screen"><h1 class="top-title">פרטי הצטרפות</h1><div class="card"><form class="form" onsubmit="submitForm(event)"><label>שם מלא<input name="name" required></label><label>טלפון<input name="phone" required inputmode="tel"></label><label>רחוב<input name="street" required></label><label>מספר בית<input name="house" required></label><label>קומה<input name="floor"></label><label>דירה<input name="apartment"></label><label>קוד כניסה לבניין<input name="entry_code"></label><label>הערה לשליח<textarea name="delivery_note" placeholder="לדוגמה: להניח ליד הדלת"></textarea></label><label class="small-card" style="display:flex;gap:12px;align-items:flex-start;color:var(--text)"><input type="checkbox" required style="width:24px;height:24px;min-width:24px"><span>אני מאשר/ת את תנאי השירות, מדיניות הביטולים והשימוש בפרטים לצורך משלוחים.</span></label><button class="cta" type="submit">המשך</button><button class="cta secondary" type="button" onclick="home()">חזרה</button></form></div></section>`}
async function submitForm(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let username=userFromPhone(d.phone),password=pin(),row={subscription_id:nextSub(),name:d.name,phone:d.phone,username,street:d.street,house:d.house,floor:d.floor,apartment:d.apartment,entry_code:d.entry_code,delivery_note:d.delivery_note,admin_note:'נרשם דרך דף ההצטרפות',paid:false,active:true,skip_today:true};row[passCol]=password;let r=await db.from('customers').insert(row).select('*').single();if(r.error){toast('שגיאה: '+clean(r.error.message));return}account={...r.data,username,password};localStorage.setItem('e10_client_id',String(r.data.id));success()}
function success(){app.innerHTML=`<section class="screen"><h1 class="top-title">🎉 ההרשמה הושלמה</h1><div class="card"><p class="muted">שמור/י את פרטי הכניסה למכשיר חדש:</p><p>שם משתמש</p><div class="cred">${clean(account.username)}</div><p>קוד אישי</p><div class="cred">${clean(account.password)}</div><button class="cta secondary" onclick="copyCreds()">העתק פרטים</button><div class="divider"></div><p class="muted">במכשיר הזה נשמרת כניסה אוטומטית. בפעם הבאה פשוט פותחים את האפליקציה.</p></div>${installBox()}<button class="cta" onclick="location.href='./client-v3.html'">כניסה לאפליקציה</button></section>`;showInstall()}
function copyCreds(){navigator.clipboard?.writeText(`ערב 10\nשם משתמש: ${account.username}\nקוד אישי: ${account.password}`);toast('פרטי הכניסה הועתקו ✅')}
function installBox(){return `<div id="installBox" class="card install-box" style="margin-top:14px"><p class="muted">מומלץ להתקין את האפליקציה למסך הבית.</p><button class="cta" onclick="installApp()">התקן את ערב 10</button><p class="mini">אם הכפתור לא מופיע, פתח ב-Chrome ובחר בתפריט “הוסף למסך הבית”.</p></div>`}
function showInstall(){setTimeout(()=>{let b=document.getElementById('installBox');if(b&&installEvent)b.classList.add('show')},100)}async function installApp(){if(!installEvent){toast('פתח בתפריט הדפדפן ובחר “הוסף למסך הבית”.');return}installEvent.prompt();await installEvent.userChoice;installEvent=null;showInstall()}
home();
</script></body></html>
