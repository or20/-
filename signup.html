<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#111006"><title>הצטרפות לערב 10</title><link rel="manifest" href="./manifest-customer.webmanifest"><link rel="stylesheet" href="./styles.css"><style>.hero-title{font-size:42px;line-height:1.05;margin:12px 0;font-weight:950}.cred{font-size:28px;color:var(--gold);font-weight:950;background:rgba(255,215,120,.08);border:1px solid rgba(255,215,120,.26);border-radius:20px;padding:14px;text-align:center}.toast{position:fixed;left:14px;right:14px;bottom:18px;z-index:9999;max-width:420px;margin:auto;background:rgba(18,14,7,.94);border:1px solid rgba(255,215,120,.32);border-radius:24px;padding:16px;box-shadow:0 24px 80px rgba(0,0,0,.55)}.mini{font-size:13px;color:var(--muted);line-height:1.5}.signup-anchor{scroll-margin-top:20px}</style></head><body><main id="app" class="app-shell"></main><div id="ui"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script><script>
const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#app'),ui=document.querySelector('#ui'),passCol=['pass','word'].join('');let account=null;
function clean(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;')}function toast(t){ui.innerHTML=`<div class="toast">${t}</div>`;setTimeout(()=>ui.innerHTML='',3000)}function userFromPhone(p){let d=String(p||'').replace(/\D/g,'').slice(-4);return 'e10'+d+Math.floor(10+Math.random()*89)}function pin(){return String(Math.floor(1000+Math.random()*9000))}function nextSub(){return 'E10-'+String(Date.now()).slice(-4)}
function home(){app.innerHTML=`<section class="screen hero"><div class="pill"><span class="dot"></span>הצטרפות לשירות</div><h1 class="hero-title"><span class="gold">ערב 10</span><br>הלחם של השכונה</h1><div class="subtitle">10 לחמניות טריות עד דלת הבית בכל ערב</div><div class="card price-card"><div class="badge">מבצע השקה לחודש יולי</div><div class="price">₪20</div><p class="muted">ליום לנרשמים במהלך חודש יולי בלבד</p><div class="divider"></div><p>לא צריך לרדת למאפייה. לא צריך לעמוד בתור. השירות מגיע עד הדלת.</p></div><button class="cta" onclick="document.getElementById('signupForm').scrollIntoView({behavior:'smooth'})">הצטרפו עכשיו</button><section style="margin-top:34px"><h2 class="section-title">איך זה עובד?</h2><div class="grid"><div class="small-card"><b>1. נרשמים</b><br><span class="muted">ממלאים פרטים ומקבלים קוד אישי.</span></div><div class="small-card"><b>2. מתחברים עם טלפון וקוד</b><br><span class="muted">המכשיר נשמר, ובפעם הבאה נכנסים אוטומטית.</span></div><div class="small-card"><b>3. מנהלים באפליקציה</b><br><span class="muted">אני רוצה היום / היום לא / עצירת מנוי.</span></div></div></section><section id="signupForm" class="signup-anchor"><h2 class="section-title">רישום לתוכנית</h2><div class="card"><form class="form" onsubmit="submitForm(event)"><label>שם מלא<input name="name" required></label><label>טלפון<input name="phone" required inputmode="tel"></label><label>רחוב<input name="street" required></label><label>מספר בית<input name="house" required></label><label>קומה<input name="floor"></label><label>דירה<input name="apartment"></label><label>קוד כניסה לבניין<input name="entry_code"></label><label>הערה לשליח<textarea name="delivery_note" placeholder="לדוגמה: להניח ליד הדלת"></textarea></label><label class="small-card" style="display:flex;gap:12px;align-items:flex-start;color:var(--text)"><input type="checkbox" required style="width:24px;height:24px;min-width:24px"><span>אני מאשר/ת את תנאי השירות והשימוש בפרטים לצורך משלוחים.</span></label><button class="cta" type="submit">יצירת חשבון</button></form></div></section></section>`}
async function submitForm(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let username=userFromPhone(d.phone),password=pin(),row={subscription_id:nextSub(),name:d.name,phone:d.phone,username,street:d.street,house:d.house,floor:d.floor,apartment:d.apartment,entry_code:d.entry_code,delivery_note:d.delivery_note,admin_note:'נרשם דרך דף ההצטרפות',paid:false,active:true,skip_today:true};row[passCol]=password;let r=await db.from('customers').insert(row).select('*').single();if(r.error){toast('שגיאה: '+clean(r.error.message));return}account={...r.data,username,password};loginScreen(true)}
function loginScreen(first){app.innerHTML=`<section class="screen"><h1 class="top-title">${first?'🎉 ההרשמה הושלמה':'כניסה לערב 10'}</h1>${first?`<div class="card"><p class="muted">הקוד האישי שלך:</p><div class="cred">${clean(account.password)}</div><p class="mini">שמור את הקוד. בכניסה משתמשים בטלפון + קוד אישי.</p></div>`:''}<div class="card"><form class="form" onsubmit="login(event)"><label>טלפון<input name="phone" required inputmode="tel" value="${account?clean(account.phone):''}"></label><label>קוד אישי<input name="password" required value="${account?clean(account.password):''}"></label><button class="cta" type="submit">כניסה לאפליקציה</button></form></div><button class="cta secondary" onclick="home()">חזרה לדף ההצטרפות</button></section>`}
async function login(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let r=await db.from('customers').select('*').eq('phone',d.phone).eq(passCol,d.password).maybeSingle();if(r.error){toast('שגיאה: '+clean(r.error.message));return}if(!r.data){toast('טלפון או קוד אישי לא נכונים');return}if(r.data.active===false){toast('המנוי עצור. פנה להפעלה מחדש.');return}localStorage.setItem('e10_client_id',String(r.data.id));location.href='./client-v3.html'}
home();
</script></body></html>
