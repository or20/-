<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111006" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ערב 10 מנהל" />
  <title>ערב 10 מנהל</title>
  <link rel="manifest" href="./manifest-manager.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="manager-app" class="app-shell"></main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    if ('serviceWorker' in navigator) window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); });
    const SUPABASE_URL = 'https://ijwahiybjlhnykbcxxxu.supabase.co';
    const SUPABASE_KEY = ['sb','publishable','mMqjUNIvzV7TZHW-awHPTg','4-Ss217y'].join('_');
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const app = document.querySelector('#manager-app');
    let customers = [];
    function safe(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;'); }
    function address(c){ return `${c.street || ''} ${c.house || ''}, קומה ${c.floor || '-'}, דירה ${c.apartment || '-'}`; }
    function activeCustomers(){ return customers.filter(c => c.active); }
    function waitingCustomers(){ return customers.filter(c => !c.active); }
    function unpaidCustomers(){ return activeCustomers().filter(c => !c.paid); }
    function bunsToOrder(){ return activeCustomers().length * 10; }
    function nextSubId(){ const max = customers.reduce((m,c)=>Math.max(m, Number(String(c.subscription_id || '').replace('E10-','')) || 0), 0); return 'E10-' + String(max + 1).padStart(4,'0'); }
    function clientLink(){ return location.origin + location.pathname.replace('manager.html','client.html'); }
    function copy(text,msg){ navigator.clipboard?.writeText(text); alert(msg); }
    async function loadCustomers(){
      app.innerHTML = '<section class="screen"><h1 class="top-title">טוען לקוחות...</h1></section>';
      const { data, error } = await db.from('customers').select('*').order('id', { ascending: true });
      if (error) { app.innerHTML = `<section class="screen"><h1 class="top-title">שגיאה</h1><div class="card"><p>${safe(error.message)}</p></div></section>`; return; }
      customers = data || [];
      render();
    }
    function render(){
      const unpaid = unpaidCustomers().length;
      const status = unpaid > 0 ? `🟠 ${unpaid} לקוחות לא שילמו` : '🟢 המערכת מוכנה לערב';
      app.innerHTML = `<section class="screen"><h1 class="top-title">ניהול ערב 10</h1><div class="small-card" style="margin-bottom:16px;font-weight:900">${status}</div><div class="stats"><div class="stat"><span>פעילים</span><strong>${activeCustomers().length}</strong></div><div class="stat"><span>המתנה</span><strong>${waitingCustomers().length}</strong></div><div class="stat"><span>לא שילמו</span><strong>${unpaid}</strong></div><div class="stat"><span>לחמניות</span><strong>${bunsToOrder()}</strong></div></div><button class="cta" onclick="bakeryMessage()">הכן הודעה למאפייה</button><button class="cta secondary" onclick="openForm()">➕ הוסף לקוח</button><button class="cta secondary" onclick="location.href='./courier.html'">פתח שליח</button><button class="cta secondary" onclick="location.href='./client.html'">פתח לקוח</button><h2 class="section-title">לקוחות</h2><input placeholder="חיפוש לקוח" oninput="filterCustomers(this.value)"><div id="customers-list" class="grid" style="margin-top:16px"></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">גרסה 0.8 · מחובר ל-Supabase</div></section>`;
      filterCustomers('');
    }
    function filterCustomers(search){
      const list = document.querySelector('#customers-list');
      const q = String(search || '').trim();
      const rows = customers.filter(c => (c.name||'').includes(q) || (c.phone||'').includes(q) || (c.subscription_id||'').includes(q) || address(c).includes(q) || (c.username||'').includes(q));
      list.innerHTML = rows.map(c => `<div class="small-card"><div class="client-row"><div><b>${safe(c.name)}</b><br><span class="muted">${safe(c.subscription_id)} · ${safe(address(c))}</span><br><span class="muted">משתמש: ${safe(c.username)} · הצטרף: ${safe((c.created_at||'').slice(0,10))}</span>${c.admin_note ? `<br><span style="color:var(--gold)">הערת מנהל: ${safe(c.admin_note)}</span>` : ''}</div><span class="status ${c.active ? (c.paid ? 'ok' : 'bad') : 'wait'}">${c.active ? (c.paid ? 'שולם' : 'לא שולם') : 'המתנה'}</span></div><div class="grid" style="grid-template-columns:1fr 1fr;margin-top:12px"><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="openForm(${c.id})">ערוך</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="togglePaid(${c.id})">${c.paid ? 'לא שולם' : 'שולם'}</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="toggleActive(${c.id})">${c.active ? 'המתנה' : 'הפעל'}</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="copy('${clientLink()}','קישור לקוח הועתק')">קישור</button></div></div>`).join('') || '<div class="small-card">אין לקוחות עדיין</div>';
    }
    function fields(c = {}){ return `<label>שם מלא<input name="name" required value="${safe(c.name)}"></label><label>טלפון<input name="phone" inputmode="tel" value="${safe(c.phone)}"></label><label>שם משתמש<input name="username" required value="${safe(c.username)}"></label><label>סיסמה<input name="password" required value="${safe(c.password)}"></label><label>רחוב<input name="street" value="${safe(c.street)}"></label><label>מספר בית<input name="house" value="${safe(c.house)}"></label><label>קומה<input name="floor" value="${safe(c.floor)}"></label><label>דירה<input name="apartment" value="${safe(c.apartment)}"></label><label>קוד כניסה<input name="entry_code" value="${safe(c.entry_code)}"></label><label>הערה לשליח<textarea name="delivery_note">${safe(c.delivery_note)}</textarea></label><label>הערת מנהל<textarea name="admin_note">${safe(c.admin_note)}</textarea></label>`; }
    function openForm(id = ''){ const c = customers.find(x => x.id === id); const modal = document.createElement('div'); modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10000;padding:22px;overflow:auto;direction:rtl'; modal.innerHTML = `<div class="card" style="max-width:520px;margin:0 auto"><h1 class="top-title">${c ? 'עריכת לקוח' : 'הוספת לקוח'}</h1><form class="form" onsubmit="saveForm(event,'${id}')">${fields(c || {})}<label class="small-card" style="display:flex;gap:12px;align-items:center;color:var(--text)"><input type="checkbox" name="paid" ${c?.paid ? 'checked' : ''} style="width:26px;height:26px;min-width:26px"> שולם</label><label class="small-card" style="display:flex;gap:12px;align-items:center;color:var(--text)"><input type="checkbox" name="active" ${c ? (c.active ? 'checked' : '') : 'checked'} style="width:26px;height:26px;min-width:26px"> מנוי פעיל</label><button class="cta" type="submit">שמור</button>${c ? `<button class="cta secondary" type="button" onclick="deleteCustomer(${c.id})">מחק לקוח</button>` : ''}<button class="cta secondary" type="button" onclick="this.closest('[style*=fixed]').remove()">סגור</button></form></div>`; document.body.appendChild(modal); }
    async function saveForm(event,id){ event.preventDefault(); const d = Object.fromEntries(new FormData(event.target)); const row = { name:d.name, phone:d.phone, username:d.username, password:d.password, street:d.street, house:d.house, floor:d.floor, apartment:d.apartment, entry_code:d.entry_code, delivery_note:d.delivery_note, admin_note:d.admin_note, paid:!!d.paid, active:!!d.active }; let result; if(id){ result = await db.from('customers').update(row).eq('id', Number(id)); } else { row.subscription_id = nextSubId(); result = await db.from('customers').insert(row); } if(result.error){ alert(result.error.message); return; } document.querySelector('[style*=fixed]')?.remove(); await loadCustomers(); }
    async function deleteCustomer(id){ if(!confirm('למחוק את הלקוח?')) return; const { error } = await db.from('customers').delete().eq('id', id); if(error){ alert(error.message); return; } await loadCustomers(); }
    async function togglePaid(id){ const c = customers.find(x=>x.id===id); await db.from('customers').update({ paid: !c.paid }).eq('id', id); await loadCustomers(); }
    async function toggleActive(id){ const c = customers.find(x=>x.id===id); await db.from('customers').update({ active: !c.active }).eq('id', id); await loadCustomers(); }
    function bakeryMessage(){ const msg = `שלום, להערב צריך להכין ${bunsToOrder()} לחמניות עבור ערב 10.\nלקוחות פעילים: ${activeCustomers().length}\nלא שילמו: ${unpaidCustomers().length}`; navigator.clipboard?.writeText(msg); alert(msg + '\n\nההודעה הועתקה.'); }
    loadCustomers();
  </script>
</body>
</html>
