<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="theme-color" content="#111006"><title>ערב 10 מנהל</title><link rel="manifest" href="./manifest-manager.webmanifest"><link rel="stylesheet" href="./styles.css"></head><body><main id="manager-app" class="app-shell"></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script><script>
if(sessionStorage.getItem('e10ok')!=='1'){let c=prompt('קוד כניסה לניהול');if(c!==['1','0','1','0'].join('')){document.querySelector('#manager-app').innerHTML='<section class="screen"><h1 class="top-title">אין גישה</h1><div class="card">קוד לא נכון</div></section>';throw new Error('locked')}sessionStorage.setItem('e10ok','1')}
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(function(){});
const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#manager-app');let customers=[];const secretCol=['pass','word'].join('');
function safe(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;')}function address(c){return `${c.street||''} ${c.house||''}, קומה ${c.floor||'-'}, דירה ${c.apartment||'-'}`}function active(){return customers.filter(c=>c.active)}function skipped(){return active().filter(c=>c.skip_today)}function delivery(){return active().filter(c=>!c.skip_today)}function unpaid(){return active().filter(c=>!c.paid)}function buns(){return delivery().length*10}function nextId(){let m=customers.reduce((x,c)=>Math.max(x,Number(String(c.subscription_id||'').replace('E10-',''))||0),0);return'E10-'+String(m+1).padStart(4,'0')}function clientLink(){return location.origin+location.pathname.replace('manager.html','client-v3.html')}function copy(t,m){navigator.clipboard?.writeText(t);alert(m)}
async function load(){app.innerHTML='<section class="screen"><h1 class="top-title">טוען לקוחות...</h1></section>';let r=await db.from('customers').select('*').order('id',{ascending:true});if(r.error){app.innerHTML=`<section class="screen"><h1 class="top-title">שגיאה</h1><div class="card">${safe(r.error.message)}</div></section>`;return}customers=r.data||[];render()}
function render(){let u=unpaid().length,s=skipped().length;app.innerHTML=`<section class="screen"><h1 class="top-title">ניהול ערב 10</h1><div class="small-card" style="margin-bottom:16px;font-weight:900">${s?'🟡 '+s+' ביטלו להיום':u?'🟠 '+u+' לא שילמו':'🟢 המערכת מוכנה לערב'}</div><div class="stats"><div class="stat"><span>פעילים</span><strong>${active().length}</strong></div><div class="stat"><span>ביטלו היום</span><strong>${s}</strong></div><div class="stat"><span>לא שילמו</span><strong>${u}</strong></div><div class="stat"><span>לחמניות</span><strong>${buns()}</strong></div></div><button class="cta" onclick="bakeryMsg()">הכן הודעה למאפייה</button><button class="cta secondary" onclick="openForm()">➕ הוסף לקוח</button><button class="cta secondary" onclick="resetSkips()">איפוס ביטולי היום</button><button class="cta secondary" onclick="location.href='./courier.html'">פתח שליח</button><button class="cta secondary" onclick="location.href='./client-v3.html'">פתח לקוח</button><h2 class="section-title">לקוחות</h2><input placeholder="חיפוש לקוח" oninput="filterCustomers(this.value)"><div id="customers-list" class="grid" style="margin-top:16px"></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">גרסה 1.1 · תצוגת לקוחות נקייה</div></section>`;filterCustomers('')}
function filterCustomers(q){let list=document.querySelector('#customers-list');q=String(q||'').trim();let rows=customers.filter(c=>(c.name||'').includes(q)||(c.phone||'').includes(q)||(c.subscription_id||'').includes(q)||address(c).includes(q)||(c.username||'').includes(q));list.innerHTML=rows.map(c=>`<div class="small-card"><div class="client-row"><div><b>${safe(c.name)}</b><br><span class="muted">${safe(c.subscription_id)} · ${safe(address(c))}</span><br><span class="muted">${safe(c.phone||'')}</span>${c.active===false?'<br><span style="color:#ff9b9b">מנוי עצור</span>':''}</div><span class="status ${c.active===false?'bad':c.skip_today?'wait':c.paid?'ok':'bad'}">${c.active===false?'עצור':c.skip_today?'היום לא':c.paid?'שולם':'לא שולם'}</span></div><div class="grid" style="grid-template-columns:1fr 1fr;margin-top:12px"><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="openForm(${c.id})">ערוך</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="togglePaid(${c.id})">${c.paid?'לא שולם':'שולם'}</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="toggleSkip(${c.id})">${c.skip_today?'בטל היום לא':'היום לא'}</button><button class="cta secondary" style="font-size:16px;padding:12px;margin:0" onclick="copy('${clientLink()}','קישור לקוח הועתק')">קישור</button></div></div>`).join('')||'<div class="small-card">אין לקוחות עדיין</div>'}
function fields(c={}){return`<label>שם מלא<input name="name" required value="${safe(c.name)}"></label><label>טלפון<input name="phone" value="${safe(c.phone)}"></label><label>שם משתמש<input name="username" required value="${safe(c.username)}"></label><label>קוד אישי<input name="pin" required value="${safe(c[secretCol])}"></label><label>רחוב<input name="street" value="${safe(c.street)}"></label><label>מספר בית<input name="house" value="${safe(c.house)}"></label><label>קומה<input name="floor" value="${safe(c.floor)}"></label><label>דירה<input name="apartment" value="${safe(c.apartment)}"></label><label>קוד כניסה<input name="entry_code" value="${safe(c.entry_code)}"></label><label>הערה לשליח<textarea name="delivery_note">${safe(c.delivery_note)}</textarea></label><label>הערת מנהל<textarea name="admin_note">${safe(c.admin_note)}</textarea></label>`}
function openForm(id=''){let c=customers.find(x=>x.id===id),m=document.createElement('div');m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10000;padding:22px;overflow:auto;direction:rtl';m.innerHTML=`<div class="card" style="max-width:520px;margin:0 auto"><h1 class="top-title">${c?'עריכת לקוח':'הוספת לקוח'}</h1><form class="form" onsubmit="saveForm(event,'${id}')">${fields(c||{})}<label class="small-card" style="display:flex;gap:12px;align-items:center;color:var(--text)"><input type="checkbox" name="paid" ${c?.paid?'checked':''} style="width:26px;height:26px;min-width:26px"> שולם</label><label class="small-card" style="display:flex;gap:12px;align-items:center;color:var(--text)"><input type="checkbox" name="active" ${c?(c.active?'checked':''):'checked'} style="width:26px;height:26px;min-width:26px"> מנוי פעיל</label><button class="cta" type="submit">שמור</button>${c?`<button class="cta secondary" type="button" onclick="deleteCustomer(${c.id})">מחק לקוח</button>`:''}<button class="cta secondary" type="button" onclick="this.closest('[style*=fixed]').remove()">סגור</button></form></div>`;document.body.appendChild(m)}
async function saveForm(e,id){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let row={name:d.name,phone:d.phone,username:d.username,street:d.street,house:d.house,floor:d.floor,apartment:d.apartment,entry_code:d.entry_code,delivery_note:d.delivery_note,admin_note:d.admin_note,paid:!!d.paid,active:!!d.active};row[secretCol]=d.pin;let r;if(id)r=await db.from('customers').update(row).eq('id',Number(id));else{row.subscription_id=nextId();row.skip_today=false;r=await db.from('customers').insert(row)}if(r.error){alert(r.error.message);return}document.querySelector('[style*=fixed]')?.remove();await load()}
async function deleteCustomer(id){if(!confirm('למחוק את הלקוח?'))return;let r=await db.from('customers').delete().eq('id',id);if(r.error)alert(r.error.message);await load()}async function togglePaid(id){let c=customers.find(x=>x.id===id);await db.from('customers').update({paid:!c.paid}).eq('id',id);await load()}async function toggleSkip(id){let c=customers.find(x=>x.id===id);await db.from('customers').update({skip_today:!c.skip_today}).eq('id',id);await load()}async function resetSkips(){if(!confirm('לאפס את כל ביטולי היום?'))return;await db.from('customers').update({skip_today:false}).eq('skip_today',true);await load()}function bakeryMsg(){let msg=`שלום, להערב צריך להכין ${buns()} לחמניות עבור ערב 10.\nלקוחות פעילים: ${active().length}\nביטלו היום: ${skipped().length}\nלא שילמו: ${unpaid().length}`;navigator.clipboard?.writeText(msg);alert(msg+'\n\nההודעה הועתקה.')}load();
</script></body></html>
