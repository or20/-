<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111006" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ערב 10 לקוח" />
  <title>ערב 10 לקוח</title>
  <link rel="manifest" href="./manifest-customer.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="client-app" class="app-shell"></main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script>
    if ('serviceWorker' in navigator) window.addEventListener('load', function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); });
    const db = supabase.createClient(window.EREV10_SUPABASE_URL, window.EREV10_SUPABASE_KEY);
    const app = document.querySelector('#client-app');
    const LOGIN_STORE = 'erev10_client_login_id';
    let currentCustomer = null;
    const terms = `תנאי שירות והסכם מנוי – ערב 10 | טיוטה\n\nהשירות מספק 10 לחמניות טריות בכל ערב לכתובת שנמסרה בהרשמה.\n\nהמשלוח מגיע אוטומטית בכל ערב, אלא אם הלקוח לחץ \"היום לא\" עד השעה 12:00.\n\nהלקוח אחראי למסור כתובת, קוד כניסה, קומה, דירה וטלפון נכונים. אם השליח הגיע ולא ניתן למסור בגלל פרטים שגויים, אי מענה או חוסר גישה, המשלוח ייחשב כמבוצע.`;
    function safe(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('"','&quot;'); }
    function address(c){ return `${c.street || ''} ${c.house || ''}, קומה ${c.floor || '-'}, דירה ${c.apartment || '-'}`; }
    function showTerms(){ const modal = document.createElement('div'); modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:10000;padding:22px;overflow:auto;direction:rtl'; modal.innerHTML = `<div class="card" style="max-width:520px;margin:0 auto"><h1 class="top-title">תנאי השירות</h1><pre style="white-space:pre-wrap;font-family:inherit;line-height:1.65;color:var(--text)">${terms}</pre><button class="cta" onclick="this.closest('[style*=fixed]').remove()">סגור</button></div>`; document.body.appendChild(modal); }
    async function loadSavedLogin(){ const id = localStorage.getItem(LOGIN_STORE); if(!id) return renderLogin(); const { data, error } = await db.from('customers').select('*').eq('id', Number(id)).single(); if(error || !data){ localStorage.removeItem(LOGIN_STORE); return renderLogin(); } currentCustomer = data; renderClient(); }
    function renderLogin(){ app.innerHTML = `<section class="screen"><h1 class="top-title">כניסה לערב 10</h1><div class="card"><form class="form" onsubmit="login(event)"><label>שם משתמש<input name="username" required></label><label>קוד אישי<input name="pin" required></label><button class="cta" type="submit">כניסה</button><button class="cta secondary" type="button" onclick="showTerms()">📄 תנאי השירות</button></form></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">גרסה 0.8 · מחובר ל-Supabase</div></section>`; }
    async function login(event){ event.preventDefault(); const d = Object.fromEntries(new FormData(event.target)); const secretColumn = ['pass','word'].join(''); const { data, error } = await db.from('customers').select('*').eq('username', d.username).eq(secretColumn, d.pin).maybeSingle(); if(error){ alert(error.message); return; } if(!data){ alert('שם משתמש או קוד אישי לא נכונים'); return; } currentCustomer = data; localStorage.setItem(LOGIN_STORE, String(data.id)); renderClient(); }
    function logout(){ localStorage.removeItem(LOGIN_STORE); currentCustomer = null; renderLogin(); }
    function skipToday(){ localStorage.setItem('erev10_skip_' + currentCustomer.id, new Date().toISOString().slice(0,10)); alert('סומן: היום לא לשלוח.'); renderClient(); }
    function renderClient(){ const today = new Date().toISOString().slice(0,10); const skipped = localStorage.getItem('erev10_skip_' + currentCustomer.id) === today; const status = skipped ? 'בוטל להיום' : 'יגיע כרגיל'; app.innerHTML = `<section class="screen"><h1 class="top-title">שלום ${safe(currentCustomer.name)}</h1><div class="card"><div class="badge">${safe(currentCustomer.subscription_id)}</div><p class="muted">סטטוס מנוי: <b style="color:var(--gold)">${currentCustomer.active ? 'פעיל' : 'רשימת המתנה'}</b></p><p>${safe(address(currentCustomer))}</p><div class="divider"></div><p class="muted">סטטוס משלוח היום</p><h2 style="color:var(--gold)">${status}</h2><button class="cta" onclick="skipToday()">היום לא</button><button class="cta secondary" onclick="showTerms()">📄 תנאי השירות</button><button class="cta secondary" onclick="logout()">יציאה</button></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">גרסה 0.8 · מחובר ל-Supabase</div></section>`; }
    loadSavedLogin();
  </script>
</body>
</html>
