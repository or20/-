<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111006" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ערב 10 שליח" />
  <title>ערב 10 שליח</title>
  <link rel="manifest" href="./manifest-courier.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="courier-app" class="app-shell"></main>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function () {});
      });
    }

    const clients = [
      { id: 'E10-0001', name: 'משפחת כהן', phone: '050-0000001', address: 'ניב דוד 12, קומה 3, דירה 8', code: 'אין', note: 'להניח ליד הדלת' },
      { id: 'E10-0002', name: 'משפחת לוי', phone: '050-0000002', address: 'ניב דוד 18, קומה 2, דירה 4', code: '1234', note: 'קוד 1234' },
      { id: 'E10-0003', name: 'משפחת מזרחי', phone: '050-0000003', address: 'ניב דוד 4, קומה 1, דירה 3', code: 'אין', note: 'להתקשר לפני' }
    ];

    let index = Number(localStorage.getItem('erev10_courier_index') || 0);
    const app = document.querySelector('#courier-app');

    function save() {
      localStorage.setItem('erev10_courier_index', String(index));
    }

    function mark(status) {
      const c = clients[index % clients.length];
      localStorage.setItem('erev10_delivery_' + c.id, status);
      index += 1;
      save();
      render();
    }

    function nextClient() {
      index += 1;
      save();
      render();
    }

    function resetRoute() {
      index = 0;
      save();
      render();
    }

    function render() {
      const c = clients[index % clients.length];
      const delivered = clients.filter(x => localStorage.getItem('erev10_delivery_' + x.id) === 'נמסר').length;
      app.innerHTML = `
        <section class="screen">
          <h1 class="top-title">מצב שליח</h1>
          <div class="small-card" style="margin-bottom:16px;font-weight:900">🚚 ${delivered} מתוך ${clients.length} נמסרו</div>
          <div class="card">
            <div class="badge">${c.id}</div>
            <div class="courier-name">${c.name}</div>
            <div class="courier-address">${c.address}</div>
            <div class="divider"></div>
            <p class="muted">קוד כניסה</p>
            <h2>${c.code}</h2>
            <p class="muted">הערה לשליח</p>
            <h2>${c.note}</h2>
            <div class="action-grid">
              <button class="cta" onclick="mark('נמסר')">נמסר</button>
              <button class="cta secondary" onclick="location.href='tel:${c.phone}'">חייג ללקוח</button>
              <button class="cta secondary" onclick="mark('לא בבית')">לא בבית</button>
              <button class="cta secondary" onclick="mark('בעיה')">בעיה</button>
              <button class="cta secondary" onclick="nextClient()">הלקוח הבא</button>
              <button class="cta secondary" onclick="resetRoute()">התחל מסלול מחדש</button>
            </div>
          </div>
          <div class="muted" style="font-size:12px;text-align:center;margin-top:18px">שליח נקי · PWA תקין</div>
        </section>
      `;
    }

    render();
  </script>
</body>
</html>
