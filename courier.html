<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111006" />
  <title>ערב 10 שליח</title>
  <link rel="manifest" href="./manifest-courier.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="courier-app" class="app-shell"></main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});
    const db = supabase.createClient(window.EREV10_SUPABASE_URL, window.EREV10_SUPABASE_KEY);
    const app = document.querySelector('#courier-app');
    let rows = [];
    let i = Number(localStorage.getItem('e10_route_i') || 0);
    function esc(v){ return String(v ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;'); }
    function addr(c){ return `${c.street || ''} ${c.house || ''}, קומה ${c.floor || '-'}, דירה ${c.apartment || '-'}`; }
    async function load(){
      app.innerHTML = '<section class="screen"><h1 class="top-title">טוען מסלול...</h1></section>';
      const res = await db.from('customers').select('*').eq('active', true).order('id', { ascending: true });
      if(res.error){ app.innerHTML = `<section class="screen"><h1 class="top-title">שגיאה</h1><div class="card">${esc(res.error.message)}</div></section>`; return; }
      rows = res.data || [];
      render();
    }
    function save(){ localStorage.setItem('e10_route_i', String(i)); }
    function done(status){ const c = rows[i % rows.length]; localStorage.setItem('e10_status_' + c.id, status); i++; save(); render(); }
    function next(){ i++; save(); render(); }
    function reset(){ i = 0; save(); render(); }
    function render(){
      if(!rows.length){ app.innerHTML = `<section class="screen"><h1 class="top-title">מצב שליח</h1><div class="card"><h2>אין לקוחות פעילים</h2></div><button class="cta secondary" onclick="load()">רענן</button></section>`; return; }
      const c = rows[i % rows.length];
      const delivered = rows.filter(x => localStorage.getItem('e10_status_' + x.id) === 'נמסר').length;
      app.innerHTML = `<section class="screen"><h1 class="top-title">מצב שליח</h1><div class="small-card" style="margin-bottom:16px;font-weight:900">🚚 ${delivered} מתוך ${rows.length} נמסרו</div><div class="card"><div class="badge">${esc(c.subscription_id)}</div><div class="courier-name">${esc(c.name)}</div><div class="courier-address">${esc(addr(c))}</div><div class="divider"></div><p class="muted">קוד כניסה</p><h2>${esc(c.entry_code || 'אין')}</h2><p class="muted">הערה לשליח</p><h2>${esc(c.delivery_note || 'אין הערה')}</h2><div class="action-grid"><button class="cta" onclick="done('נמסר')">נמסר</button><button class="cta secondary" onclick="done('לא בבית')">לא בבית</button><button class="cta secondary" onclick="done('בעיה')">בעיה</button><button class="cta secondary" onclick="next()">הלקוח הבא</button><button class="cta secondary" onclick="reset()">התחל מחדש</button><button class="cta secondary" onclick="load()">רענן מהשרת</button></div></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">גרסה 0.8 · מחובר ל-Supabase</div></section>`;
    }
    load();
  </script>
</body>
</html>
