<!doctype html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#111006"><title>ערב 10 לקוח</title><link rel="stylesheet" href="./styles.css"></head><body><main id="app" class="app-shell"></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./supabase-config.js"></script><script>
const db=supabase.createClient(window.EREV10_SUPABASE_URL,window.EREV10_SUPABASE_KEY),app=document.querySelector('#app'),STORE='e10_client_id';let me=null;const codeCol=['pass','word'].join('');
function safe(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;')}function addr(c){return `${c.street||''} ${c.house||''}, קומה ${c.floor||'-'}, דירה ${c.apartment||'-'}`}
async function start(){let id=localStorage.getItem(STORE);if(!id)return loginScreen();let r=await db.from('customers').select('*').eq('id',Number(id)).single();if(r.error||!r.data){localStorage.removeItem(STORE);return loginScreen()}me=r.data;clientScreen()}
function loginScreen(){app.innerHTML=`<section class="screen"><h1 class="top-title">כניסה לערב 10</h1><div class="card"><form class="form" onsubmit="login(event)"><label>שם משתמש<input name="u" required></label><label>קוד אישי<input name="p" required></label><button class="cta" type="submit">כניסה</button></form></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">לקוח v2 · ביטול בענן</div></section>`}
async function login(e){e.preventDefault();let d=Object.fromEntries(new FormData(e.target));let r=await db.from('customers').select('*').eq('username',d.u).eq(codeCol,d.p).maybeSingle();if(r.error){alert(r.error.message);return}if(!r.data){alert('שם משתמש או קוד אישי לא נכונים');return}me=r.data;localStorage.setItem(STORE,String(me.id));clientScreen()}
function out(){localStorage.removeItem(STORE);me=null;loginScreen()}
async function toggleSkip(){let next=!me.skip_today;let r=await db.from('customers').update({skip_today:next}).eq('id',me.id);if(r.error){alert(r.error.message);return}me.skip_today=next;alert(next?'סומן: היום לא לשלוח.':'עודכן: המשלוח יגיע כרגיל.');clientScreen()}
async function refresh(){let r=await db.from('customers').select('*').eq('id',me.id).single();if(!r.error&&r.data){me=r.data;clientScreen()}}
function clientScreen(){let status=me.skip_today?'בוטל להיום':'יגיע כרגיל';app.innerHTML=`<section class="screen"><h1 class="top-title">שלום ${safe(me.name)}</h1><div class="card"><div class="badge">${safe(me.subscription_id)}</div><p class="muted">סטטוס מנוי: <b style="color:var(--gold)">${me.active?'פעיל':'רשימת המתנה'}</b></p><p>${safe(addr(me))}</p><div class="divider"></div><p class="muted">סטטוס משלוח היום</p><h2 style="color:var(--gold)">${status}</h2><button class="cta" onclick="toggleSkip()">${me.skip_today?'אני כן רוצה היום':'היום לא'}</button><button class="cta secondary" onclick="refresh()">רענן סטטוס</button><button class="cta secondary" onclick="out()">יציאה</button></div><div class="muted" style="font-size:12px;text-align:center;margin-top:18px">גרסה 0.9 · מחובר ל-Supabase</div></section>`}
start();
</script></body></html>
